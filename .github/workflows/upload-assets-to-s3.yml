name: Upload Assets to S3

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: # Allow manual trigger

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    
    # Required for OIDC
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2  # Need previous commit to diff against

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        role-session-name: GitHubActions-UploadAssets
        aws-region: eu-west-2

    - name: Upload changed assets to S3
      working-directory: ./SideQuestMarket
      run: |
        echo "Uploading changed assets to S3 bucket: side-quest-market"
        echo "Current directory: $(pwd)"

        # Get list of files changed in this push
        CHANGED=$(git diff --name-only HEAD~1 HEAD)
        echo "Changed files:"
        echo "$CHANGED"

        # Helper: returns true if any changed file is under the given path
        changed_in() {
          echo "$CHANGED" | grep -q "SideQuestMarket/$1"
        }

        # Upload optimized images
        if changed_in "assets/optimized" && [ -d "assets/optimized" ]; then
          echo "Uploading optimized assets..."
          aws s3 sync assets/optimized/ s3://side-quest-market/assets/optimized/ \
            --exclude "*.ai" --exclude "*.psd" --exclude "*.zip" \
            --include "*.png" --include "*.jpg" --include "*.jpeg" \
            --include "*.gif" --include "*.svg" --include "*.webp" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE --delete
        else
          echo "No changes in assets/optimized - skipping"
        fi

        # Upload dice images
        if changed_in "assets/Dice" && [ -d "assets/Dice" ]; then
          echo "Uploading dice assets..."
          aws s3 sync assets/Dice/ s3://side-quest-market/assets/Dice/ \
            --exclude "*.ai" \
            --include "*.png" --include "*.jpg" --include "*.jpeg" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE --delete
        else
          echo "No changes in assets/Dice - skipping"
        fi

        # Upload vendor logos
        if changed_in "assets/VendorLogos" && [ -d "assets/VendorLogos" ]; then
          echo "Uploading vendor logos..."
          aws s3 sync assets/VendorLogos/ s3://side-quest-market/assets/VendorLogos/ \
            --include "*.png" --include "*.jpg" --include "*.jpeg" --include "*.svg" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE --delete
        else
          echo "No changes in assets/VendorLogos - skipping"
        fi

        # Upload full logos
        if changed_in "assets/FullLogo" && [ -d "assets/FullLogo" ]; then
          echo "Uploading full logos..."
          aws s3 sync assets/FullLogo/ s3://side-quest-market/assets/FullLogo/ \
            --include "*.png" --include "*.jpg" --include "*.jpeg" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE --delete
        else
          echo "No changes in assets/FullLogo - skipping"
        fi

        # Upload event media
        if changed_in "assets/EventMedia" && [ -d "assets/EventMedia" ]; then
          echo "Uploading event media..."
          aws s3 sync assets/EventMedia/ s3://side-quest-market/assets/EventMedia/ \
            --include "*.png" --include "*.jpg" --include "*.jpeg" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE --delete
        else
          echo "No changes in assets/EventMedia - skipping"
        fi

        # Upload market photos
        if changed_in "assets/MarketPhotos_2025_optimized" && [ -d "assets/MarketPhotos_2025_optimized" ]; then
          echo "Uploading market photos..."
          aws s3 sync assets/MarketPhotos_2025_optimized/ s3://side-quest-market/assets/MarketPhotos_2025_optimized/ \
            --include "*.png" --include "*.jpg" --include "*.jpeg" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE --delete
        else
          echo "No changes in assets/MarketPhotos_2025_optimized - skipping"
        fi

        # Upload banners
        if changed_in "assets/Banners" && [ -d "assets/Banners" ]; then
          echo "Uploading banners..."
          aws s3 sync assets/Banners/ s3://side-quest-market/assets/Banners/ \
            --include "*.png" --include "*.jpg" --include "*.jpeg" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE --delete
        else
          echo "No changes in assets/Banners - skipping"
        fi

        # Upload social media assets
        if changed_in "assets/Social media" && [ -d "assets/Social media" ]; then
          echo "Uploading social media assets..."
          aws s3 sync "assets/Social media/" "s3://side-quest-market/assets/Social media/" \
            --include "*.png" --include "*.jpg" --include "*.jpeg" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE --delete
        else
          echo "No changes in assets/Social media - skipping"
        fi

        # Upload videos
        if changed_in "assets/videos" && [ -d "assets/videos" ]; then
          echo "Uploading videos..."
          aws s3 sync assets/videos/ s3://side-quest-market/assets/videos/ \
            --include "*.mp4" --include "*.webm" --include "*.mov" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE
        else
          echo "No changes in assets/videos - skipping"
        fi

        echo "Upload completed!"
